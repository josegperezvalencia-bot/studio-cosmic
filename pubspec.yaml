name: cosmic_wallpaper_studio
description: Creador de wallpapers animados 3D con efecto parallax y estética futurista espacial.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sensors_plus: ^4.0.2
  uuid: ^4.3.3
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
